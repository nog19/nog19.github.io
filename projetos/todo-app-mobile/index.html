<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8B5CF6">
    <meta name="description" content="Gerenciador de tarefas offline - Organize suas tarefas em qualquer lugar">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Minhas Tarefas">
    <title>Minhas Tarefas</title>
    
    <!-- manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238B5CF6' rx='20' width='100' height='100'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>📝</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238B5CF6' rx='20' width='100' height='100'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>📝</text></svg>">
    
    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- estilização -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- header  -->
        <header class="app-header">
            <div class="header-bg"></div>
            <div class="header-content">
                <div class="header-left">
                    <div class="avatar">
                        <span>🗒</span>
                    </div>
                    <div class="header-text">
                        <p class="greeting">Olá, seja Bem-vindo(a)!</p>
                        <h1>Minhas Tarefas</h1>
                    </div>
                </div>
                <button class="search-btn" id="searchBtn" aria-label="Buscar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <div class="search-bar" id="searchBar">
                <input type="text" id="searchInput" placeholder="Buscar tarefas...">
                <button class="close-search" id="closeSearch">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6 6 18M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- cards de resumo -->
        <div class="summary-cards">
            <div class="summary-card total">
                <div class="card-icon">📋</div>
                <div class="card-info">
                    <span class="card-number" id="totalCount">0</span>
                    <span class="card-label">Total</span>
                </div>
            </div>
            <div class="summary-card active">
                <div class="card-icon">⏳</div>
                <div class="card-info">
                    <span class="card-number" id="activeCount">0</span>
                    <span class="card-label">Pendentes</span>
                </div>
            </div>
            <div class="summary-card completed">
                <div class="card-icon">✅</div>
                <div class="card-info">
                    <span class="card-number" id="completedCount">0</span>
                    <span class="card-label">Feitas</span>
                </div>
            </div>
        </div>

        <!-- barra de progresso -->
        <div class="progress-section">
            <div class="progress-header">
                <span>Seu progresso</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- titulo -->
        <div class="section-header">
            <h2>
                <span id="filterTitle">Todas as tarefas</span>
                <span class="count-badge" id="sectionCount">0</span>
            </h2>
        </div>

        <!-- lista de tarefas -->
        <main class="task-list" id="taskList">
            <!-- as tarefas vao ser exibidas aqui -->
        </main>

        <!-- estado vazio -->
        <div class="empty-state" id="emptyState">
            <div class="empty-illustration">
                <div class="floating-task">📝</div>
                <div class="floating-task delay-1">✨</div>
                <div class="floating-task delay-2">🎯</div>
            </div>
            <h2>Nenhuma tarefa ainda!</h2>
            <p>Toque no botão + para adicionar sua primeira tarefa</p>
            <button class="add-first-btn" id="addFirstBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
                Adicionar tarefa
            </button>
        </div>

        <!-- parte de cima, cabeçalho -->
        <nav class="bottom-nav">
            <button class="nav-tab active" data-filter="all">
                <div class="tab-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </div>
                <span class="tab-label">Todas</span>
            </button>
            <button class="nav-tab" data-filter="active">
                <div class="tab-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12,6 12,12 16,14"></polyline>
                    </svg>
                </div>
                <span class="tab-label">Ativas</span>
            </button>
            <button class="nav-tab" data-filter="completed">
                <div class="tab-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22,4 12,14.01 9,11.01"></polyline>
                    </svg>
                </div>
                <span class="tab-label">Feitas</span>
            </button>
        </nav>
        <!-- botão de ação flutuante -->
        <button class="fab" id="addTaskBtn" aria-label="Adicionar tarefa">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14"></path>
            </svg>
        </button>
    </div>

    <!--criação/edição tarefas -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                </div>
                <h2 id="modalTitle">Nova Tarefa</h2>
                <button class="modal-close" id="modalClose" aria-label="Fechar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6 6 18M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        Título *
                    </label>
                    <input type="text" id="taskTitle" placeholder="O que você precisa fazer?" required>
                </div>
                <div class="form-group">
                    <label for="taskCategory">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        Categoria
                    </label>
                    <div class="category-select">
                        <select id="taskCategory">
                            <option value="">Selecione...</option>
                            <option value="personal">👤 Pessoal</option>
                            <option value="work">💼 Trabalho</option>
                            <option value="shopping">🛒 Compras</option>
                            <option value="health">💪 Saúde</option>
                            <option value="study">📚 Estudos</option>
                            <option value="other">📌 Outro</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskDueDate">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Data de vencimento
                    </label>
                    <input type="date" id="taskDueDate">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20,6 9,17 4,12"></polyline>
                        </svg>
                        Salvar
                    </button>
                </div>
                <button type="button" class="btn btn-danger delete-btn" id="deleteBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3,6 5,6 21,6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Excluir Tarefa
                </button>
            </form>
        </div>
    </div>

    <!-- confirmação de delete -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-icon">🗑️</div>
            <h3>Confirmar exclusão</h3>
            <p>Tem certeza que deseja excluir esta tarefa?</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="confirmCancel">Cancelar</button>
                <button class="btn btn-danger" id="confirmDelete">Excluir</button>
            </div>
        </div>
    </div>

    <!-- notificação --> 
    <div class="toast" id="toast">
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
